<!-- templates/base.html -->
{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DRC Transactions{% endblock title %}</title>
    <!-- Inclure Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Inclure Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.7.0/dist/alpine.min.js" defer></script>
    <!-- Inclure htmx -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.7.0/dist/htmx.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto py-4">
        <header>
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container-fluid">
                    <!-- Logo -->
                    <a class="navbar-brand" href="#">
                        <img src="{% static 'assets/img/logo.png' %}" alt="Logo DRC" class="logo-img">
                        DRC Transactions
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <!-- Ajoutez vos liens de navigation ici -->
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

        <footer class="mt-5">
            <p class="text-center">&copy; {% now "Y" %} DRC Transactions. Développé par Ben Kaluseyiko.</p>
        </footer>
    </div>

    <!-- Inclure Crispy Forms JS pour le formulaire -->
    <script src="{% static 'js/crispy_forms.js' %}"></script>
</body>
</html>
