<!-- logout.html -->

{% extends 'base.html' %}

{% block content %}
<form class="max-w-md mx-auto my-8 p-8 bg-white rounded shadow-lg" method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <h2 class="text-2xl font-bold text-center mb-4">Déconnexion</h2>
    <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
    <button type="submit" class="mt-4 bg-gray-800 text-white rounded-lg px-6 py-3 block shadow-xl hover:bg-black hover:text-white">Déconnexion</button>
</form>
{% endblock %}
